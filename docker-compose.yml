# DB + Redis độc lập với dự án cinex (root: /Users/vutuongan/cinex)
#   - SQL Server: 1434 (cinex: 1433)
#   - Redis:      6380 (cinex: 6379)
#   - Backend:    8089 (cinex: 8088)
#   - Frontend:   5174 (cinex: 5173)
#   - Database:   cinex_team (cinex: cinex)
# Volume + container name có prefix "cinex-team-" → 2 dự án chạy song song không đè data.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cinex-team-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "CineX@2026"
    ports:
      - "1434:1433"
    volumes:
      - cinex-team-sqlserver-data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    container_name: cinex-team-redis
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinex-team-backend
    ports:
      - "8089:8089"
    environment:
      SERVER_PORT: 8089
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: cinex_team
      DB_USERNAME: sa
      DB_PASSWORD: "CineX@2026"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: "Y2luZXgtdGVhbS1zZWNyZXQta2V5LWZvci1kZW1vLW9ubHktZG8tbm90LXVzZS1pbi1wcm9k"
    depends_on:
      - sqlserver
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cinex-team-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  cinex-team-sqlserver-data:
